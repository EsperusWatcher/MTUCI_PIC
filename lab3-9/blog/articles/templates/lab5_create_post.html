{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Django Public Blog - создать статью</title>
    <link rel="stylesheet" href="{% static 'css/lab5_creation_form.css' %}">
</head>
<body class="create-post">
    <div class="header">
        <img src="{% static 'img/logo.png' %}" />
    </div>
    <div class="content"> 
        <h1>Новая статья</h1>
        <div class="nav">
            <label>Вы публикуете как: ({{ request.user.username }})</label>
        </div>
    </div>
    <div class="content">
        <form method="POST" action="">
            {% csrf_token %}
            
            {% if form.errors %}
            <div class="errors">{{ form.errors }}</div>
            {% endif %}
            
            <div class="form-group">
                <label for="post_title">Название статьи:</label>
                <input type="text" 
                name="title" 
                id="title"
                placeholder="Введите название статьи"
                value="{{ form.title }}"
                class="form-control {% if form.title_error %}error{% endif %}">
                {% if form.title_error %}
                <div class="field-error">{{ form.title_error }}</div>
                {% endif %}
            </div>
            
            <div class="form-group">
                <label for="text">Текст статьи:</label>
                <textarea type="text" 
                name="text" 
                id="text"
                value="{{ form.text }}"
                placeholder="Введите текст статьи"></textarea>
            </div>
            <button type="submit" class="submit-btn">Опубликовать</button>
        </form>
        <div class="nav">
        <a href="{% url 'archive' %}">← Все записи</a>
        </div>
    </div>
    

</body>
</html>
