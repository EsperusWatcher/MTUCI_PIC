{% load static %}
<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>Архив всех статей</title>
    <link rel="stylesheet" href="{% static 'css/article.css' %}">
</div>
</head>

<body class="archive">
    <div class="header">
        <img src="{% static 'img/logo.png' %}" />
        <h1>Коллективный Блог</h1>
    </div>
    <div class="nav">
        {% if request.user.is_authenticated %}
            <label>Вы вошли как: ({{ request.user.username }}) | </label>
            <a href="{% url 'create_post' %}">Новая Статья</a>
            <label> | </label>
            <a href="{% url 'logout' %}">Выход</a>
            {% else %}
            <a href="{% url 'authentication' %}">Вход</a>
            <label> | </label>
            <a href="{% url 'registration' %}">Регистрация</a>
            {% endif %}
        </div>
        
    <div class="parallax-icons">
        <img class="parallax-icons-first" src="{% static 'img/parallax-icon.png' %}" alt="">
        <img class="parallax-icons-second" src="{% static 'img/parallax-icon.png' %}" alt="">
        <img class="parallax-icons-third" src="{% static 'img/parallax-icon.png' %}" alt="">
    </div>
        
    <div class="archive">
        {% for post in posts %}
            <div class="one-post">

                <h2 class="post-title">
                    <a href="{% url 'get_article' post.id %}">{{ post.title }}</a>
                    <button class="fold-button">свернуть</button>
                </h2>

                <div class="article-info">
                    <div class="article-author">{{ post.author.username }}</div>
                    <div class="article-created-date">{{ post.created_date }}</div>
                </div>

                <p class="article-text">{{ post.get_excerpt }}</p>
                <div class="one-post-shadow"></div>
            </div>
        {% endfor %}
    </div>
    
    <script src="{% static 'js/jquery.min.js' %}"></script>
    <script src="{% static 'js/helloworld.js' %}"></script>
    <script src="{% static 'js/parallax.js' %}"></script>
</body>
</html>
